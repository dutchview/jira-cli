version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: jira
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      # Ad-hoc code-sign macOS binaries. Apple Silicon (M-series) refuses to run
      # unsigned arm64 Mach-O binaries and kills the process immediately. Because
      # the release cross-compiles darwin builds on Linux, GoReleaser produces
      # unsigned binaries, so we sign them in place with rcodesign before archiving.
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ]; then rcodesign sign "{{ .Path }}"; fi'

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: dutchview
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: jira
    homepage: "https://github.com/dutchview/jira-cli"
    description: "Command-line interface for Jira Cloud"
    license: "MIT"
    install: |
      bin.install "jira"
    test: |
      system "#{bin}/jira", "--version"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
